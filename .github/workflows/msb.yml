name: Capella CI/CD

on:
  workflow_dispatch:
    inputs:
      SERVER:
        description: "Target Server IP"
        required: true
        default: "10.0.0.4"

jobs:

# ================= BUILD ================= #
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install NuGet
      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      # Install MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Restore packages
      - name: Restore NuGet Packages
        run: |
          echo "NuGet restore start"
          nuget restore EHR-Capella5.0.sln
          echo "NuGet restore completed"

      # Build + Publish
      - name: Build & Publish Solution
        run: |
          echo "Build start"
          msbuild EHR-Capella5.0.sln `
            /p:DeployOnBuild=true `
            /p:Configuration=Release `
            /p:WebPublishMethod=FileSystem `
            /p:PublishUrl="${{ github.workspace }}\publish" `
            /p:DeleteExistingFiles=True `
            /p:Platform="Any CPU"
          echo "Build completed"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
         name: capella-build
         path: ${{ github.workspace }}\publish

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: capella-build
          path: publish

# ================= DEPLOY TEST 10.0.0.4 ================= #
  deploy_test_4:
    needs: build
    runs-on: windows-2022
    if: ${{ github.event.inputs.SERVER == '10.0.0.4' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: capella-build

      - name: Deploy to TEST 10.0.0.4
        run: |
          echo "Backup Start"
          xcopy /y /s "E:\Acurus_Web\capella_cmg_project\capella_cmg_mt\*.*" "E:\Acurus_Web\Deployee\Backup-do not delete\Git\capella_cmg_mt"
          echo "Backup Completed"

          echo "Deploy Start"
          xcopy /y /s "publish\*.*" "E:\Acurus_Web\capella_cmg_project\capella_cmg_mt\"
          echo "Deploy Completed"

# ================= DEPLOY TEST 10.0.0.11 ================= #
  deploy_test_11:
    needs: build
    runs-on: windows-2022
    if: ${{ github.event.inputs.SERVER == '10.0.0.11' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: capella-build

      - name: Deploy to TEST 10.0.0.11
        run: |
          echo "Backup Start"
          xcopy /y /s "E:\Acurus_Web\capella_cmg_project\capella_cmg_mt\*.*" "E:\Acurus_Web\Deployee\Backup-do not delete\Git\capella_cmg_mt"

          echo "Deploy Start"
          xcopy /y /s "publish\*.*" "E:\Acurus_Web\capella_cmg_project\capella_cmg_mt\"
